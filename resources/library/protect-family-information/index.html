<script id="resource-page-data" type="application/json">{"title": {"en": "Protect Private Family Information", "es": "Proteja la información privada de su familia"}, "summary": {"en": "A checklist for deciding what should stay private before sharing a document, photo, link, or family story.", "es": "Una lista para decidir qué debe permanecer privado antes de compartir un documento, foto, enlace o historia familiar."}, "pillars": ["Health", "Education & Skills"], "principles": ["Policies", "Systems", "Self-awareness"], "why": {"en": "Family learning is more useful when people feel safe. Public resources should teach and encourage without exposing information that could identify, embarrass, harm, or financially endanger a family member.", "es": "El aprendizaje familiar es más útil cuando las personas se sienten seguras. Los recursos públicos deben enseñar y animar sin revelar información que pueda identificar, avergonzar, dañar o poner en riesgo financiero a un miembro de la familia."}, "keyPoints": [{"en": "Remove full names, personal phone numbers, home addresses, account numbers, and private email addresses.", "es": "Elimine nombres completos, números de teléfono personales, direcciones, números de cuenta y correos privados."}, {"en": "Do not publish private Google Drive or Google Docs links.", "es": "No publique enlaces privados de Google Drive o Google Docs."}, {"en": "Do not share school, medical, mental-health, legal, or financial records without a clear lawful purpose and permission.", "es": "No comparta registros escolares, médicos, de salud mental, legales o financieros sin un propósito legal claro y permiso."}, {"en": "Get permission before publishing identifiable photos, quotes, or family stories.", "es": "Obtenga permiso antes de publicar fotos identificables, citas o historias familiares."}, {"en": "Use examples, fictional names, and general descriptions whenever possible.", "es": "Use ejemplos, nombres ficticios y descripciones generales siempre que sea posible."}], "questions": [{"en": "Could this information identify a child or adult?", "es": "¿Esta información podría identificar a un niño o adulto?"}, {"en": "Would the person expect this detail to remain private?", "es": "¿La persona esperaría que este detalle permaneciera privado?"}, {"en": "Can the lesson be taught without sharing the private detail?", "es": "¿Se puede enseñar la lección sin compartir el detalle privado?"}], "actions": [{"en": "Remove unnecessary personal details.", "es": "Elimine los detalles personales innecesarios."}, {"en": "Replace private links with a public page or official source.", "es": "Reemplace los enlaces privados con una página pública o fuente oficial."}, {"en": "Ask another adult to complete a privacy review before publication.", "es": "Pida a otro adulto que complete una revisión de privacidad antes de publicar."}], "source": {"en": "Aligned with FamilyPD’s emphasis on safety, clear household policies, intentional systems, and respectful communication.", "es": "Alineado con el énfasis de FamilyPD en la seguridad, políticas claras del hogar, sistemas intencionales y comunicación respetuosa."}, "privacy": {"en": "Use examples that protect names, addresses, account information, health details, school records, and other private family information.", "es": "Use ejemplos que protejan nombres, direcciones, información de cuentas, detalles de salud, registros escolares y otra información familiar privada."}}</script><script src="../../../assets/js/main.js"></script><script src="../../../assets/js/public-resource-page.js"></script></body></html>
